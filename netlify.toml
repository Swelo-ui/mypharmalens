[build]
  publish = "dist"
  command = "npm run build"

# Edge Function: injects correct canonical Link HTTP header for all drug pages
# Runs at CDN edge before JS — fixes Googlebot seeing wrong canonical on SPA shell
[[edge_functions]]
  function = "seo-canonical"
  path = "/drug/*"

[build.environment]
  NODE_VERSION = "20.19.2"

# Redirect all traffic to HTTPS
[[redirects]]
  from = "http://pharmalens.tech/*"
  to = "https://pharmalens.tech/:splat"
  status = 301
  force = true

# Redirect www to non-www
[[redirects]]
  from = "https://www.pharmalens.tech/*"
  to = "https://pharmalens.tech/:splat"
  status = 301
  force = true

# Trailing slash redirects — prevents duplicate content from /drug/X and /drug/X/
# (must be BEFORE the SPA catch-all below)
[[redirects]]
  from = "/drug/*/"
  to = "/drug/:splat"
  status = 301
  force = true

[[redirects]]
  from = "/drugs/"
  to = "/drugs"
  status = 301
  force = true

[[redirects]]
  from = "/search/"
  to = "/search"
  status = 301
  force = true

[[redirects]]
  from = "/symptom-checker/"
  to = "/symptom-checker"
  status = 301
  force = true

# SPA fallback - must be last
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[[headers]]
  for = "/service-worker.js"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Security headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' https://www.googletagmanager.com https://www.google-analytics.com https://challenges.cloudflare.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com data:; connect-src 'self' https://*.supabase.co https://sentry.io https://o*.ingest.sentry.io https://www.google-analytics.com https://wsearch.nlm.nih.gov; img-src 'self' data: blob: https:; frame-src https://challenges.cloudflare.com; worker-src 'self' blob:; manifest-src 'self';"

# Cache images longer
[[headers]]
  for = "/*.png"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.jpg"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.webp"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Sitemap XML files - ensure correct Content-Type for Google crawlers
[[headers]]
  for = "/sitemap*.xml"
  [headers.values]
    Content-Type = "application/xml; charset=utf-8"
    Cache-Control = "public, max-age=3600"

# NOTE: Netlify [[headers]] does NOT support dynamic :id path params (only [[redirects]] do).
# Drug page canonicals are handled by react-helmet-async (SEOHead component) + Edge Function.
# The /symptom-checker canonical header below is safe (no dynamic param).
[[headers]]
  for = "/symptom-checker"
  [headers.values]
    Link = "<https://pharmalens.tech/symptom-checker>; rel=\"canonical\""



# Cache fonts
[[headers]]
  for = "/*.woff2"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"