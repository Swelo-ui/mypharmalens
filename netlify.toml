[build]
  publish = "dist"
  command = "npm run build"

[build.environment]
  NODE_VERSION = "20.19.2"

# Redirect all traffic to HTTPS
[[redirects]]
  from = "http://pharmalens.tech/*"
  to = "https://pharmalens.tech/:splat"
  status = 301
  force = true

# Redirect www to non-www
[[redirects]]
  from = "https://www.pharmalens.tech/*"
  to = "https://pharmalens.tech/:splat"
  status = 301
  force = true

# SPA fallback - must be last
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[[headers]]
  for = "/service-worker.js"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"