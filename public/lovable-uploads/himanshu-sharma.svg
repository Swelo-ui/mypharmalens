<svg width="300" height="400" viewBox="0 0 300 400" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="300" height="400" fill="#f8fafc"/>
  
  <!-- Professional silhouette -->
  <g transform="translate(150, 200)">
    <!-- Head -->
    <circle cx="0" cy="-60" r="40" fill="#e2e8f0" stroke="#cbd5e1" stroke-width="2"/>
    
    <!-- Body/Suit -->
    <path d="M -50 -20 L -50 120 L 50 120 L 50 -20 L 35 -25 L 35 -35 C 35 -45 25 -50 0 -50 C -25 -50 -35 -45 -35 -35 L -35 -25 Z" 
          fill="#1e293b" stroke="#334155" stroke-width="1"/>
    
    <!-- Shirt -->
    <path d="M -30 -20 L -30 120 L 30 120 L 30 -20 Z" fill="#3b82f6"/>
    
    <!-- Tie -->
    <path d="M -8 -20 L -8 60 L 0 70 L 8 60 L 8 -20 Z" fill="#dc2626"/>
    
    <!-- Collar -->
    <path d="M -30 -20 L -15 -10 L 0 -15 L 15 -10 L 30 -20" 
          fill="none" stroke="#1e293b" stroke-width="2"/>
  </g>
  
  <!-- Professional badge/icon -->
  <g transform="translate(50, 50)">
    <circle cx="0" cy="0" r="25" fill="#059669" opacity="0.1"/>
    <path d="M -10 -5 L -5 0 L 10 -15 M -10 5 L -5 10 L 10 -5" 
          stroke="#059669" stroke-width="2" fill="none"/>
  </g>
  
  <!-- Text placeholder -->
  <text x="150" y="350" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#64748b">
    Himanshu Sharma
  </text>
  <text x="150" y="370" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#94a3b8">
    B.Pharm Student & Developer
  </text>
</svg>